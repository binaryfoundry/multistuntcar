<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Stunt Car Remake</title>
    <style type="text/css">
      html, body {
        margin: 0;
      }
      .emscripten {
        width: 100%;
        height: 100%;
        display: flex;
        position: absolute;
        align-items: center;
        justify-content: center;
      }
      .game {
        width: 100%;
        height: 100%;
        display: block;
      }
      .loading {
        position: absolute;
      }
      .game[width] + .loading {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="emscripten">
      <canvas id="canvas" class="game" oncontextmenu="event.preventDefault()"></canvas>
      <div class="loading">Loading...</div>
    </div>
    <script type="text/javascript">
        const $game = document.querySelector('.game');
        function resize() {
            const canvas = document.getElementById('canvas');
            if (!canvas || typeof Module === 'undefined' || !Module.canvas) return;
            const w = Math.max(1, window.innerWidth);
            const h = Math.max(1, window.innerHeight);
            if (canvas.width !== w || canvas.height !== h) {
                canvas.width = w;
                canvas.height = h;
            }
        }
        var Module = {
            print(text) {
                console.log(Array.prototype.slice.call(arguments).join(' '));
            },
            printErr() {
                console.error(Array.prototype.slice.call(arguments).join(' '));
            },
            canvas: document.getElementById('canvas') || $game,
            noStdioInit: true
        };
        window.addEventListener('resize', resize, false);
        window.triggerResize = resize;
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() { resize(); });
        } else {
            resize();
        }
        // Work-around chromium autoplay policy
        // https://github.com/emscripten-core/emscripten/issues/6511
        function resumeAudio(e) {
            if (typeof Module === 'undefined'
                || typeof Module.SDL2 == 'undefined'
                || typeof Module.SDL2.audioContext == 'undefined')
                return;
            if (Module.SDL2.audioContext.state == 'suspended') {
                Module.SDL2.audioContext.resume();
            }
            if (Module.SDL2.audioContext.state == 'running') {
                $game.removeEventListener('click', resumeAudio);
                document.removeEventListener('keydown', resumeAudio);
            }
        }
        $game.addEventListener('click', resumeAudio);
        document.addEventListener('keydown', resumeAudio);
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
